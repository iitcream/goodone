<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Funding Deals · March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:     #f5f0e8;
    --parchment: #ede5d0;
    --sand:      #d9c9a8;
    --terra:     #c1643c;
    --terra-dk:  #a04e2a;
    --soil:      #5c3d2e;
    --soil-lt:   #7a5545;
    --sienna:    #8b4513;
    --moss:      #6b7c4b;
    --muted:     #8a7060;
    --border:    #c9b99a;
    --card-bg:   #faf6ef;
    --teal:      #1a9e96;
    --teal-dk:   #147a73;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 18% 0%, rgba(193,100,60,0.09) 0%, transparent 50%),
      radial-gradient(ellipse at 82% 100%, rgba(92,61,46,0.07) 0%, transparent 50%);
    color: var(--soil);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
  }
  .page { max-width: 1380px; margin: 0 auto; padding: 0 28px 80px; }

  /* ── HEADER ── */
  header {
    padding: 52px 0 38px;
    display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 24px;
    border-bottom: 2px solid var(--terra); margin-bottom: 38px; position: relative;
  }
  header::before {
    content: 'INDIA · STARTUP · ECOSYSTEM · MARCH 2026';
    position: absolute; top: 20px; left: 0;
    font-size: 10px; letter-spacing: 0.28em; color: var(--terra); font-weight: 600;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 5.5vw, 68px); font-weight: 900;
    line-height: 0.95; color: var(--soil); letter-spacing: -0.02em;
  }
  h1 em { font-style: italic; color: var(--terra); }
  .hstats { display: flex; gap: 30px; padding-bottom: 4px; }
  .hstat { text-align: right; }
  .hstat-v { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--terra); line-height: 1; }
  .hstat-l { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
  .sw { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .sw svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted); }
  .sw input {
    width: 100%; background: var(--parchment); border: 1.5px solid var(--border);
    color: var(--soil); font-family: 'Instrument Sans', sans-serif; font-size: 13px;
    padding: 9px 13px 9px 34px; border-radius: 8px; outline: none; transition: border-color 0.15s;
  }
  .sw input::placeholder { color: var(--muted); }
  .sw input:focus { border-color: var(--terra); }
  .pills { display: flex; gap: 7px; flex-wrap: wrap; }
  .pill {
    background: var(--parchment); border: 1.5px solid var(--border); color: var(--muted);
    font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; padding: 5px 13px; border-radius: 100px; cursor: pointer;
    transition: all 0.14s; white-space: nowrap;
  }
  .pill:hover { border-color: var(--terra); color: var(--terra); }
  .pill.on { background: var(--terra); border-color: var(--terra); color: #fff; }

  .count-row { font-size: 12px; color: var(--muted); margin-bottom: 22px; }
  .count-row b { color: var(--soil); }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(348px, 1fr)); gap: 18px; }

  /* ── CARD ── */
  .card {
    background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    animation: rise 0.42s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes rise { from { opacity:0; transform:translateY(18px) scale(0.97); } to { opacity:1; transform:none; } }
  .card:hover { box-shadow: 0 8px 30px rgba(92,61,46,0.13), 0 2px 6px rgba(193,100,60,0.09); transform: translateY(-4px); border-color: var(--terra); }

  .stripe { height: 4px; }
  .s-agri  { background: linear-gradient(90deg,#6b7c4b,#8ba060); }
  .s-ai    { background: linear-gradient(90deg,#8b4513,#b5601e); }
  .s-ecom  { background: linear-gradient(90deg,#c1643c,#d4845e); }
  .s-fin   { background: linear-gradient(90deg,#4a7c59,#6a9e78); }
  .s-ent   { background: linear-gradient(90deg,#7a5545,#9e7060); }
  .s-edu   { background: linear-gradient(90deg,#b8860b,#d4a017); }
  .s-food  { background: linear-gradient(90deg,#b5451b,#d46030); }
  .s-clean { background: linear-gradient(90deg,#4a8c6f,#6aae90); }
  .s-hw    { background: linear-gradient(90deg,#5c7a8c,#7a9eb0); }

  .cbody { padding: 19px 21px 0; flex: 1; }
  .ctop  { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .cname { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--soil); line-height: 1.2; }
  .chip  { background: var(--terra); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; }

  .tags  { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag   { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
  .t-sec { background: rgba(139,69,19,0.10); color: var(--sienna); }
  .t-stg { background: rgba(107,124,75,0.12); color: var(--moss); }
  .t-mod { background: rgba(193,100,60,0.10); color: var(--terra-dk); }

  .igrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 16px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--parchment); }
  .ik { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .iv { font-size: 12px; color: var(--soil); font-weight: 500; }
  .inv-l { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .inv-v { font-size: 11px; color: var(--soil-lt); line-height: 1.5; margin-bottom: 14px; }

  /* FOOTER */
  .cfoot {
    padding: 13px 21px 17px; display: flex; justify-content: space-between; align-items: center;
    gap: 8px; background: var(--parchment); border-top: 1px solid var(--border); margin-top: auto;
  }
  .date { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); }
  .btns { display: flex; gap: 7px; }

  /* Google button */
  .btn-g {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--soil); color: var(--cream);
    font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 600;
    padding: 7px 12px; border-radius: 7px; border: none; cursor: pointer;
    text-decoration: none; transition: background 0.14s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-g:hover { background: var(--terra-dk); transform: scale(1.03); }
  .btn-g svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* Perplexity button */
  .btn-p {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--teal); color: #fff;
    font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 600;
    padding: 7px 12px; border-radius: 7px; border: none; cursor: pointer;
    text-decoration: none; transition: background 0.14s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-p:hover { background: var(--teal-dk); transform: scale(1.03); }
  .btn-p svg { width: 12px; height: 12px; flex-shrink: 0; }

  .no-results { grid-column:1/-1; text-align:center; padding:80px; color:var(--muted); font-size:14px; }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Funding <em>Deals</em><br>March 2026</h1>
    <div class="hstats">
      <div class="hstat"><div class="hstat-v">22</div><div class="hstat-l">Deals</div></div>
      <div class="hstat"><div class="hstat-v">$246M+</div><div class="hstat-l">Raised</div></div>
      <div class="hstat"><div class="hstat-v">9</div><div class="hstat-l">Sectors</div></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="sw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search company, sector, investor…" oninput="render()">
    </div>
    <div class="pills" id="pills"></div>
  </div>

  <div class="count-row"><b id="cnt">22</b> deals shown</div>
  <div class="grid" id="grid"></div>
</div>

<script>
const deals = [
  {date:"2026-03-13",company:"Waycool",sector:"Agritech",subsector:"Market Linkage",model:"B2B-B2C",amount:"$22.7 Mn",stage:"–",investors:"Lightrock India"},
  {date:"2026-03-12",company:"GalaxEye",sector:"Advanced Hardware & Technology",subsector:"Spacetech",model:"B2B",amount:"$4.8 Mn",stage:"Series A",investors:"Speciale Invest, Mela Venture, Rainmatter, Mounttech Growth Fund, Anicut Capital, Navam Venture Fund, Faad Capital, LV Angel Fund, Eraya Capital"},
  {date:"2026-03-12",company:"Mosiac Wellness",sector:"Ecommerce",subsector:"D2C",model:"B2C",amount:"$21.7 Mn",stage:"–",investors:"360One Asset"},
  {date:"2026-03-11",company:"Constems-AI",sector:"AI",subsector:"Application Layer",model:"B2B",amount:"$2 Mn",stage:"Pre-Series A",investors:"Finvolve, Cognify, AIF, Inflection Point Ventures, IIM Lucknow Enterprise Incubation Centre"},
  {date:"2026-03-11",company:"OpenCFO",sector:"Fintech",subsector:"Fintech SaaS",model:"B2B",amount:"$2 Mn",stage:"Seed",investors:"Endiya Partners"},
  {date:"2026-03-11",company:"Mozark",sector:"Enterprise Tech",subsector:"Horizontal SaaS",model:"B2B",amount:"$40 Mn",stage:"Series B",investors:"International Finance Corporation, RMB Capitalworks, Kalaari Capital"},
  {date:"2026-03-11",company:"Bonkers Corner",sector:"Ecommerce",subsector:"D2C",model:"B2C",amount:"$15 Mn",stage:"Series A",investors:"India SME Investments, Phoenix Family Office"},
  {date:"2026-03-11",company:"Confluxe",sector:"Enterprise Services",subsector:"–",model:"B2B",amount:"$1.6 Mn",stage:"Pre-Seed",investors:"Wavemaker Partners, Kriscore Capital"},
  {date:"2026-03-11",company:"UP&RUN",sector:"Ecommerce",subsector:"D2C",model:"B2C",amount:"$206K",stage:"–",investors:"–"},
  {date:"2026-03-11",company:"NPrep",sector:"Edtech",subsector:"Digital Learning Platform",model:"B2C",amount:"$1.5 Mn",stage:"Seed",investors:"Lumikai"},
  {date:"2026-03-11",company:"Boba Bhai",sector:"Foodtech",subsector:"QSR",model:"B2C",amount:"$4.4 Mn",stage:"–",investors:"8i Ventures, Titan Capital Winners Fund, Global Growth Capital"},
  {date:"2026-03-11",company:"Aditi Toys",sector:"Ecommerce",subsector:"D2C",model:"B2C",amount:"$3.9 Mn",stage:"–",investors:"GVFL"},
  {date:"2026-03-10",company:"Zoff Foods",sector:"Ecommerce",subsector:"D2C",model:"B2C",amount:"$2 Mn",stage:"Pre-Series B",investors:"JM Financial, Aman Gupta (boAt)"},
  {date:"2026-03-10",company:"Captain Fresh",sector:"Ecommerce",subsector:"B2B Ecommerce",model:"B2B",amount:"$31.4 Mn",stage:"Debt",investors:"Blue Earth Capital"},
  {date:"2026-03-10",company:"Verdant Impact",sector:"Agritech",subsector:"Agri-Bio Tech",model:"B2C",amount:"$3 Mn",stage:"Seed",investors:"Unicorn India Ventures, Infynyte Club, Yash Kotak, a-IDEA NAARM"},
  {date:"2026-03-10",company:"Coreworks AI",sector:"AI",subsector:"Application Layer",model:"B2B",amount:"$5 Mn",stage:"Seed",investors:"Together Fund"},
  {date:"2026-03-10",company:"Newtrace",sector:"Cleantech",subsector:"Climate Tech",model:"B2B",amount:"$6.3 Mn",stage:"Pre-Series A",investors:"HDFC, Mitsui Sumitomo Insurance Venture Capital"},
  {date:"2026-03-10",company:"AquaExchange",sector:"Agritech",subsector:"Farmtech",model:"B2C",amount:"$8 Mn",stage:"Series B",investors:"Endiya Partners, Factor Analytics, Accion Ventures"},
  {date:"2026-03-10",company:"Skye Air",sector:"Advanced Hardware & Technology",subsector:"Aerial Vehicles",model:"B2B",amount:"$9 Mn",stage:"Series B",investors:"IAN Alpha Fund, AVNM Ventures, Faad Capital, Bajaj Capital, Chiratae Ventures, Mount Judi Ventures"},
  {date:"2026-03-09",company:"StrideOne",sector:"Fintech",subsector:"Lending Tech",model:"B2B",amount:"$11 Mn",stage:"–",investors:"–"},
  {date:"2026-03-09",company:"KaarTech",sector:"Enterprise Tech",subsector:"Horizontal SaaS",model:"B2C",amount:"$11 Mn",stage:"Series B",investors:"Playbook Partners"},
  {date:"2026-03-09",company:"Latent AI",sector:"AI",subsector:"AI Infrastructure & Development",model:"B2B",amount:"–",stage:"–",investors:"AUM Ventures"},
];

const stripeMap = {
  "Agritech":"s-agri","AI":"s-ai","Ecommerce":"s-ecom","Fintech":"s-fin",
  "Enterprise Tech":"s-ent","Enterprise Services":"s-ent",
  "Edtech":"s-edu","Foodtech":"s-food","Cleantech":"s-clean",
  "Advanced Hardware & Technology":"s-hw"
};

// Sector pills
const sectors = ['All',...[...new Set(deals.map(d=>d.sector))].sort()];
let active = 'All';
const pEl = document.getElementById('pills');
sectors.forEach(s=>{
  const b = document.createElement('button');
  b.className='pill'+(s==='All'?' on':'');
  b.textContent = s==='Advanced Hardware & Technology'?'HardTech':s;
  b.onclick=()=>{ active=s; document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on')); b.classList.add('on'); render(); };
  pEl.appendChild(b);
});

function fmt(d){ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

// Google URL — opens "company name India startup" search
function googleUrl(company, sector){
  const q = `${company} India startup ${sector} founder founded HQ valuation employees`;
  return `https://www.google.com/search?q=${encodeURIComponent(q)}`;
}

// Perplexity URL with a rich structured prompt
function perplexityUrl(d){
  const prompt = `Give me a detailed company profile for "${d.company}", an Indian startup in the ${d.sector} sector (${d.subsector}, ${d.model} model) that recently raised ${d.amount} (${d.stage} round, investors: ${d.investors}).

Please structure the answer clearly with the following sections:

## 🏢 Company Overview
- What does the company do? (2–3 sentences)
- Website & domain

## 👤 Founding
- Year founded
- Founder(s) name(s) and background

## 📍 Headquarters
- City and state in India

## 📊 Scale & Traction
- Number of employees
- Number of customers / registered users
- App downloads (if applicable)
- Annual revenue (if known)
- Valuation (latest known)

## 🛍 Products & Services
- Key products or services offered

## 💰 Funding History
- All known funding rounds with amounts and investors

## ⚔️ Competition
- 2–3 key competitors in India

## 📰 Latest News
- Any recent developments, product launches, or news

Use actual data where available. If data is unavailable, clearly say so.`;

  return `https://www.perplexity.ai/search?q=${encodeURIComponent(prompt)}`;
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  const list = deals.filter(d=>{
    const ms = active==='All'||d.sector===active;
    const mq = !q||[d.company,d.sector,d.subsector,d.investors,d.stage].join(' ').toLowerCase().includes(q);
    return ms&&mq;
  });
  document.getElementById('cnt').textContent=list.length;
  if(!list.length){grid.innerHTML='<div class="no-results">No deals match your filters.</div>';return;}
  list.forEach((d,i)=>{
    const card=document.createElement('div');
    card.className='card'; card.style.animationDelay=(i*0.04)+'s';
    const sc=stripeMap[d.sector]||'s-ent';
    card.innerHTML=`
      <div class="stripe ${sc}"></div>
      <div class="cbody">
        <div class="ctop">
          <div class="cname">${d.company}</div>
          ${d.amount!=='–'?`<div class="chip">${d.amount}</div>`:''}
        </div>
        <div class="tags">
          <span class="tag t-sec">${d.sector}</span>
          ${d.stage!=='–'?`<span class="tag t-stg">${d.stage}</span>`:''}
          <span class="tag t-mod">${d.model}</span>
        </div>
        <div class="igrid">
          <div><div class="ik">Sub-sector</div><div class="iv">${d.subsector}</div></div>
          <div><div class="ik">Model</div><div class="iv">${d.model}</div></div>
        </div>
        ${d.investors!=='–'?`<div class="inv-l">Investors</div><div class="inv-v">${d.investors}</div>`:''}
      </div>
      <div class="cfoot">
        <div class="date">${fmt(d.date)}</div>
        <div class="btns">
          <a class="btn-g" href="${googleUrl(d.company,d.sector)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12.18V13.83H18.69C18.36 17.64 15.19 19.27 12.19 19.27C8.36 19.27 5 16.25 5 12C5 7.9 8.2 4.73 12.19 4.73C15.29 4.73 17.1 6.7 17.1 6.7L19 4.72C19 4.72 16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12C2.03 17.05 6.16 22 12.25 22C17.6 22 21.5 18.33 21.5 12.91C21.5 11.76 21.35 11.1 21.35 11.1Z"/></svg>
            Google
          </a>
          <a class="btn-p" href="${perplexityUrl(d)}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Deep Research
          </a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

render();
</script>
</body>
</html>
